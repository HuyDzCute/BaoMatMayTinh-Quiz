        value: puin-2a8df
      - key: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
        value: puin-2a8df.firebasestorage.app
      - key: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
        value: "959918893638"
      - key: NEXT_PUBLIC_FIREBASE_APP_ID
        value: "1:959918893638:web:999afbf6e9cf3d44fcb847"
